<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      border: none;
      border-radius: 5px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Welcome to Dashboard 🎉</h1>
  <button onclick="logout()">Logout</button>
</div>

<script>
function logout(){
  localStorage.removeItem("token");
  window.location.href = "index.html";
}
</script>

</body>
</html>
